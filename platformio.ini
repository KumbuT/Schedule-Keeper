[env:seeed_xiao_esp32c3]
platform = espressif32 @ 6.4.0
board = seeed_xiao_esp32c3
framework = arduino

board_build.filesystem = littlefs

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  ESP32Async/AsyncTCP @ ^3.3.8
  ESP32Async/ESPAsyncWebServer @ ^3.7.6
  bblanchon/ArduinoJson @ ^7.0.0
  fbiego/ESP32Time @ ^2.0.0

; ESP8266Audio is intentionally excluded — it pulls in AudioGeneratorMIDI
; which fails to compile on the ESP32-C3 RISC-V core. Audio is handled
; directly via the ESP-IDF I2S driver instead (driver/i2s.h).
lib_ignore =
  ESP8266Audio

monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DASYNC_TCP_SSL_ENABLED=0
  -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
  -D CONFIG_ASYNC_TCP_USE_WDT=0
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  ; Font support — USER_SETUP_LOADED=1 means TFT_eSPI takes NO defaults from
  ; its own User_Setup.h, including these. Without them, every text-drawing
  ; call (print/drawString/printf) compiles down to a silent no-op — shapes
  ; (fillRect, drawSmoothArc, drawRect) are unaffected, which is exactly why
  ; only the WiFi arcs + battery box ever appeared. LOAD_GLCD alone covers
  ; every call in this codebase (all text uses the default font via
  ; setTextSize(), nothing calls setFreeFont()); FONT2/4/6/7/8 are cheap
  ; bitmap tables kept in case a later screen wants a different size.
  ; NOTE: deliberately NOT defining SMOOTH_FONT or LOAD_GFXFF — SMOOTH_FONT
  ; pulls TFT_eSPI's own <FS.h> include for loading .vlw font files, whose
  ; File type collides with LittleFS's File (see AudioManager.h's `File
  ; _file;` member) and is unused here anyway since nothing calls
  ; setFreeFont().
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D TFT_MOSI=10
  -D TFT_SCLK=8
  -D TFT_CS=3
  -D TFT_DC=4
  -D TFT_RST=5
  -D TFT_MISO=9    
  -D TOUCH_CS=6
  ; -D SPI_FREQUENCY=40000000
  ; -D SPI_TOUCH_FREQUENCY=2500000
  -D SPI_FREQUENCY=10000000
  -D SPI_TOUCH_FREQUENCY=1000000
  
